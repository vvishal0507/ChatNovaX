<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTP Verification - ChatNovaX</title>
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-wrap">
    <form class="auth-card" id="otpForm">
      <h1>Verify OTP</h1>
      <input type="email" id="email" placeholder="Email" required />
      <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6" required />
      <button type="submit">Verify</button>
      <button type="button" id="resendBtn" class="secondary-btn">Resend OTP</button>
      <p id="message"></p>
    </form>
  </div>
  <script src="js/api.js"></script>
  <script src="js/otp.js"></script>
</body>
</html>
